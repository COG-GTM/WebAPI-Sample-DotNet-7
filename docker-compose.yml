services:
  webapi:
    container_name: webapi_container
    ports:
      - "5000:5000"
    depends_on:
      postgres_db:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - ConnectionStrings__DefaultConnection=Host=${POSTGRES_HOST:-postgres_container};Port=5432;Database=${POSTGRES_DB:-SampleDB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true;
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - dev_network
  postgres_db:
    container_name: postgres_container
    image: postgres:17
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-SampleDB}
      PGDATA: /data/postgres
    volumes:
       - postgres_data:/data/postgres
    ports:
      - "5433:5432"
    networks:
      - dev_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-SampleDB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: mysecretpassword
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8080:80"
    networks:
      - dev_network
    restart: unless-stopped

networks:
  dev_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
